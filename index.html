<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Human Risk Training Lab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: url('https://giriaryan694-a11y.github.io/human-risk-training-lab/assets/images/wallpaper.png') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      overflow: hidden;
      color: white;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.72);
      z-index: 1;
    }

    .desktop {
      position: relative;
      z-index: 2;
      height: 100vh;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
    }

    .icons {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 28px;
      padding: 20px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
    }

    .icon:hover {
      transform: scale(1.12) translateY(-6px);
    }

    .icon img {
      width: 72px;
      height: 72px;
      margin-bottom: 12px;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.7));
    }

    .icon span {
      font-size: 14.5px;
      font-weight: 600;
      text-shadow: 0 3px 8px rgba(0, 0, 0, 0.9);
      background: rgba(0, 0, 0, 0.55);
      padding: 6px 14px;
      border-radius: 8px;
      width: 100%;
    }

    /* Taskbar */
    .taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(10, 10, 10, 0.96);
      backdrop-filter: blur(15px);
      padding: 12px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 100;
    }

    .taskbar-title {
      color: #00ff9d;
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      .icons {
        gap: 22px;
      }
      .icon img {
        width: 62px;
        height: 62px;
      }
      .icon span {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <div class="desktop">

    <div class="icons">

      <a href="mail/index.html" class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968534.png" alt="Mail">
        <span>Mail</span>
      </a>

      <a href="lookup/index.html" class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/3138/3138297.png" alt="Lookup Tools">
        <span>Lookup Tools</span>
      </a>

      <a href="anti-virus/index.html" class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/1045/1045690.png" alt="Anti Virus">
        <span>Anti Virus</span>
      </a>

      <a href="ticketbox/index.html" class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/942/942748.png" alt="Support Ticket">
        <span>Support Ticket</span>
      </a>

      <a href="tips/index.html" class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968890.png" alt="Security Tips">
        <span>Security Tips</span>
      </a>

      <!-- New AI Chatbot Icon -->
      <a href="AI/index.html" class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/10270/10270415.png" alt="AI Chatbot">
        <span>AI Assistant</span>
      </a>

    </div>

  </div>

  <!-- Taskbar -->
  <div class="taskbar">
    <div class="taskbar-title">
      Human Risk Training Lab
    </div>
  </div>

</body>
</html>
