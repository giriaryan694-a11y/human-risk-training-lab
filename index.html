<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Human Risk Training Lab</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: url('https://giriaryan694-a11y.github.io/human-risk-training-lab/assets/images/wallpaper.png') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      overflow: hidden;
      color: white;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.68);
      z-index: 1;
    }

    .desktop {
      position: relative;
      z-index: 2;
      height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .icons {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 25px;
      padding: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100px;
      cursor: pointer;
      transition: all 0.25s ease;
      user-select: none;
    }

    .icon:hover {
      transform: scale(1.1) translateY(-5px);
    }

    .icon img {
      width: 68px;
      height: 68px;
      margin-bottom: 10px;
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.6));
    }

    .icon span {
      font-size: 14px;
      font-weight: 500;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 12px;
      border-radius: 6px;
      width: 100%;
    }

    /* Taskbar */
    .taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(15, 15, 15, 0.95);
      backdrop-filter: blur(12px);
      padding: 10px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 100;
    }

    .taskbar-title {
      color: #00ff9d;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      .icons {
        gap: 20px;
        padding: 20px;
      }
      .icon img {
        width: 58px;
        height: 58px;
      }
      .icon span {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <div class="desktop">

    <div class="icons">

      <a href="mail/index.html" class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968534.png" alt="Mail">
        <span>Mail</span>
      </a>

      <a href="lookup/index.html" class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/3138/3138297.png" alt="Lookup Tools">
        <span>Lookup Tools</span>
      </a>

      <a href="anti-virus/index.html" class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/3104/3104685.png" alt="Anti Virus">
        <span>Anti Virus</span>
      </a>

      <a href="ticketbox/index.html" class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/942/942748.png" alt="Support Ticket">
        <span>Support Ticket</span>
      </a>

      <a href="tips/index.html" class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968890.png" alt="Security Tips">
        <span>Security Tips</span>
      </a>

    </div>

  </div>

  <!-- Taskbar -->
  <div class="taskbar">
    <div class="taskbar-title">
      Human Risk Training Lab
    </div>
  </div>

</body>
</html>
