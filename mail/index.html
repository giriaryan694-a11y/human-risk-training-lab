<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mail - Human Risk Training Lab</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a1a;
      padding: 12px 20px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .back-btn {
      background: none;
      border: none;
      color: #00ff9d;
      font-size: 26px;
      cursor: pointer;
      padding: 5px 10px;
    }

    .logo {
      color: #00ff9d;
      font-weight: bold;
      font-size: 21px;
    }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .email-list {
      width: 380px;
      border-right: 1px solid #333;
      overflow-y: auto;
      background: #121212;
    }

    .email-item {
      padding: 15px 18px;
      border-bottom: 1px solid #222;
      cursor: pointer;
      transition: 0.2s;
    }

    .email-item:hover { background: #1f1f1f; }
    .email-item.unread { background: #1a2533; }

    .email-subject {
      font-weight: 600;
      margin-bottom: 5px;
      color: white;
    }

    .email-sender {
      font-size: 14.5px;
      color: #bbb;
    }

    .email-time {
      font-size: 12.5px;
      color: #777;
      float: right;
    }

    .email-viewer {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
      background: #0a0a0a;
    }

    .email-title {
      font-size: 26px;
      margin-bottom: 12px;
    }

    .email-meta {
      display: flex;
      justify-content: space-between;
      font-size: 15px;
      color: #ccc;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }

    .markdown-content {
      line-height: 1.75;
      font-size: 16.2px;
    }

    .markdown-content h1, .markdown-content h2, .markdown-content h3 {
      color: #00ff9d;
      margin: 25px 0 12px;
    }

    .warning-box {
      background: #3a2a00;
      border-left: 5px solid #ffaa00;
      padding: 12px 16px;
      margin: 20px 0;
      border-radius: 4px;
    }

    .no-email {
      text-align: center;
      margin-top: 120px;
      color: #666;
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .email-list { width: 100%; height: 45%; }
    }
  </style>
</head>
<body>

  <header>
    <button class="back-btn" onclick="window.history.back()">←</button>
    <div class="logo">Mail Simulator</div>
  </header>

  <div class="container">
    <div class="email-list" id="emailList"></div>

    <div class="email-viewer" id="emailViewer">
      <div class="no-email">
        <h2>📬 Select an email to read</h2>
        <p>Training Mode: Look for suspicious links and requests.</p>
      </div>
    </div>
  </div>

  <script>
    let emails = [];

    async function loadEmails() {
      try {
        const res = await fetch('mails-info.json');
        emails = await res.json();
        renderEmailList();
      } catch (e) {
        document.getElementById('emailList').innerHTML = 
          `<p style="color:red; padding:20px;">Error loading mails-info.json</p>`;
      }
    }

    function renderEmailList() {
      const container = document.getElementById('emailList');
      container.innerHTML = '';

      emails.forEach(email => {
        const div = document.createElement('div');
        div.className = `email-item ${email.unread ? 'unread' : ''}`;
        div.innerHTML = `
          <div class="email-subject">${email.subject}</div>
          <div class="email-sender">${email.sender}</div>
          <div class="email-time">${email.time}</div>
        `;
        div.onclick = () => openEmail(email);
        container.appendChild(div);
      });
    }

    async function openEmail(email) {
      const viewer = document.getElementById('emailViewer');

      viewer.innerHTML = `
        <div class="email-header">
          <h1 class="email-title">${email.subject}</h1>
          <div class="email-meta">
            <div>
              <strong>From:</strong> ${email.sender}<br>
              <strong>To:</strong> ${email.receiver}
            </div>
            <div>${email.time}</div>
          </div>
        </div>

        <div class="markdown-content" id="mdContent">
          Loading email content...
        </div>
      `;

      if (email.mdFile) {
        try {
          const res = await fetch(email.mdFile);
          const text = await res.text();
          document.getElementById('mdContent').innerHTML = marked.parse(text);
        } catch (err) {
          document.getElementById('mdContent').innerHTML = 
            `<p style="color:#ff6666;">Failed to load email content.</p>`;
        }
      }
    }

    // Initialize
    window.onload = loadEmails;
  </script>
</body>
</html>
